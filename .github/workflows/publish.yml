# NOTE: This workflow runs on-demand only (via "Run workflow" button in the
# Actions tab). Regular scheduled publishing runs locally via launchd on
# Spence's Mac, using the Max subscription instead of API credits.
# Manual runs here still use ANTHROPIC_API_KEY and incur per-run cost.

name: ThinkBot Publish Pipeline

on:
  workflow_dispatch: # Manual trigger from GitHub UI only — no cron schedule

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PUSH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run publish pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          git config user.name "ThinkBot"
          git config user.email "thinkbot@users.noreply.github.com"
          chmod +x scripts/publish.sh
          scripts/publish.sh

      - name: Log results
        if: always()
        run: |
          echo "=== New articles ==="
          git log --oneline -5
          echo ""
          echo "=== Article count ==="
          ls -1 website/content/articles/*.md | wc -l
