# NOTE: This workflow runs on-demand only (via "Run workflow" button in the
# Actions tab). Regular scheduled news monitoring runs locally via launchd on
# Spence's Mac, using the Max subscription instead of API credits.
# Manual runs here still use ANTHROPIC_API_KEY and incur per-run cost.

name: ThinkBot News Monitor

on:
  workflow_dispatch: # Manual trigger from GitHub UI only — no cron schedule

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PUSH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Scan for breaking news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          git config user.name "ThinkBot"
          git config user.email "thinkbot@users.noreply.github.com"
          chmod +x scripts/news-monitor.sh
          scripts/news-monitor.sh

      - name: Log results
        if: always()
        run: |
          echo "=== Recent articles ==="
          ls -lt website/content/articles/*.md | head -5
